<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Portal dos Filhos — Casa de Caridade</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#b8860b">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- iOS: app em tela cheia -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Portal dos Filhos">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: #1a140a; overflow: hidden;
    }
    #app {
      position: fixed; inset: 0;
      border: 0; width: 100%; height: 100%;
    }
    /* Tela de carregamento enquanto o portal abre */
    #splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #f6efdd; color: #3a3329;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      transition: opacity .4s ease; z-index: 10;
    }
    #splash img { width: 110px; height: 110px; border-radius: 22px; }
    #splash .t { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
    #splash .s { font-size: 12px; color: #8a7d63; text-transform: uppercase; letter-spacing: 2px; }
    .spin { width: 26px; height: 26px; border: 3px solid #e6d4a6;
            border-top-color: #b8860b; border-radius: 50%;
            animation: r 1s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }

    /* Botão flutuante "Instalar aplicativo" */
    #install {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
      z-index: 20; display: none; align-items: center; gap: 8px;
      background: #b8860b; color: #fff; border: 0; border-radius: 999px;
      padding: 12px 22px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    /* Instruções para iPhone (Safari não tem botão de instalar) */
    #ios-tip {
      position: fixed; left: 12px; right: 12px; bottom: 16px; z-index: 20;
      display: none; background: #fffdf8; color: #3a3329; border: 1px solid #e6d4a6;
      border-radius: 14px; padding: 14px 16px; font-size: 14px; line-height: 1.5;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
    }
    #ios-tip b { color: #b8860b; }
    #ios-tip .x { float: right; color: #8a7d63; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icon-192.png" alt="Casa de Caridade">
    <div class="t">Portal dos Filhos</div>
    <div class="s">Casa de Caridade</div>
    <div class="spin"></div>
  </div>

  <iframe id="app"
          src="https://casa-caridades-sbi.streamlit.app/?embed=true"
          allow="camera; clipboard-read; clipboard-write; fullscreen"
          referrerpolicy="origin"></iframe>

  <button id="install">⬇️ Instalar aplicativo</button>

  <div id="ios-tip">
    <span class="x" onclick="document.getElementById('ios-tip').style.display='none'">✕</span>
    Para instalar: toque em <b>Compartilhar</b> e depois em
    <b>“Adicionar à Tela de Início”</b>.
  </div>

  <script>
    // Esconde o splash quando o portal terminar de carregar.
    var frame = document.getElementById('app');
    var splash = document.getElementById('splash');
    function hideSplash() {
      if (!splash) return;
      splash.style.opacity = '0';
      setTimeout(function () { splash.style.display = 'none'; }, 450);
    }
    frame.addEventListener('load', function () { setTimeout(hideSplash, 800); });
    // Garante que o splash não trave caso o evento 'load' não dispare.
    setTimeout(hideSplash, 6000);

    // Service worker (necessário para o app ser "instalável" no Android).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }

    // Detecta se já está rodando instalado (standalone) — aí não mostra nada.
    var standalone = window.matchMedia('(display-mode: standalone)').matches
                     || window.navigator.standalone === true;

    // ── Android/Chrome: captura o evento e mostra o botão "Instalar" ──
    var deferredPrompt = null;
    var btn = document.getElementById('install');
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      deferredPrompt = e;
      if (!standalone) btn.style.display = 'inline-flex';
    });
    btn.addEventListener('click', function () {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.finally(function () {
        deferredPrompt = null;
        btn.style.display = 'none';
      });
    });
    window.addEventListener('appinstalled', function () {
      btn.style.display = 'none';
    });

    // ── iPhone/iPad (Safari): não dispara beforeinstallprompt → mostra dica ──
    var isiOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    if (isiOS && !standalone) {
      setTimeout(function () {
        document.getElementById('ios-tip').style.display = 'block';
      }, 2500);
    }
  </script>
</body>
</html>
